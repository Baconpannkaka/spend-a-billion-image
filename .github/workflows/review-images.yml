name: Review imported product images

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Vad ska göras med bilderna?"
        required: true
        default: approve-ids
        type: choice
        options:
          - approve-ids
          - approve-all
          - reject-ids
          - reset-ids
      product_ids:
        description: "Kommaseparerade produkt-id:n. Lämnas tomt endast vid approve-all."
        required: false
        default: ""
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: product-image-review
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  review-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Generate product catalogs
        run: npm run catalog:generate

      - name: Apply review decision
        run: npm run images:review -- --action=${{ inputs.action }} --ids="${{ inputs.product_ids }}"

      - name: Validate image data
        run: npm run images:validate

      - name: Run full quality checks
        run: npm run verify

      - name: Build static site
        run: npm run build

      - name: Commit decisions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/product-images public/data/image-manifest.json public/data/image-review.json
          if git diff --cached --quiet; then
            echo "Inga ändringar att spara."
          else
            git commit -m "chore(images): review imported product images"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: review-and-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
